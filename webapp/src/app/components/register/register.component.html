<div class="flex justify-center w-full">
    <div class="bg-white p-8 rounded-2xl shadow-md w-6/12 sm:w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Register</h2>
        <form [formGroup] = "registerForm">
            <!-- Name -->
            <div class="mb-4">
                <mat-form-field class="w-full">
                    <mat-label for="name">Name</mat-label>
                    <input type="text" formControlName="name" matInput required />
                </mat-form-field>
            </div>

            <!-- Email -->
            <div class="mb-4">
                <mat-form-field class="w-full">
                    <mat-label for="email">Email</mat-label>
                    <input type="text" formControlName="email" matInput required />
                </mat-form-field>
            </div>

            <!-- Password -->
            <div class="mb-6">
                <mat-form-field class="w-full">
                    <mat-label for="password">Password</mat-label>
                    <input type="password" formControlName="password" matInput required />
                </mat-form-field>
            </div>

            <!-- Submit Button -->
            <div>
                <button mat-raised-button (click)="register()" [disabled]="registerForm.invalid" >Register </button>
            </div>
        </form>
    </div>
</div>
