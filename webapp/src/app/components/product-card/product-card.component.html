<div class="border-r-4 w-full h-full flex flex-col shadow-lg">

    <!-- Image Section -->
    <div style="width: 100%; height: 200px; overflow: hidden;">
        <img [src]="product.images[0]" alt="Product Image" class="w-full h-full object-cover"
            [routerLink]="'/product/' + product._id" />
    </div>

    <!-- Content Section -->
    <div class="p-4 flex flex-1 flex-col justify-between h-full">
        <div [routerLink]="'/product/' + product._id">
            <h6 class="mb-2">{{product.name}}</h6>
            <p style="font-size: 14px; color: #777; margin: 10px 0;">
                {{product.shortDescription}}
            </p>
        </div>

        <!-- Price and Add to Cart in Same Line -->
        <div class="flex justify-between items-baseline">
            <div class="flex gap-2 items-baseline">
                <p class="text-lg  text-grey-400 mt-4"><s>₹{{product.Price}}</s></p>
                <p class="text-lg  text-orange-400 mt-4">{{product.discount}}% OFF</p>
                <p class="text-lg font-bold text-green-400 mt-4">₹{{sellingPrice}}</p>
            </div>
            <button matFab color="warn" (click)="addToWishList(product)">
                <!-- <mat-icon>favorite</mat-icon> -->
                @if(isInWishList(product)) {
                <mat-icon class="text-red-500">favorite</mat-icon>
                }@else{
                <mat-icon>favorite_border</mat-icon>
                }
            </button>
            <button matFab color="primary" (click)="addToCart(product)">
                @if (isProductInCart(product._id!)) {
                <mat-icon>remove_shopping_cart</mat-icon>
                }@else {
                <mat-icon>add_shopping_cart</mat-icon>
                }
            </button>


        </div>
    </div>
</div>
